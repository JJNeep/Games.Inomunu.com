<html>

</head>
  <body>
    <a href="#" onclick="handleDownloadAndRedirect(event)">Download Now</a>

<script>
function handleDownloadAndRedirect(event) {
    event.preventDefault(); // Stop the link from following the "#"
    
    const fileUrl = 'eggs/slithery/snake/hacker_shell.py'; // The file to download
    const redirectUrl = '/'; // Where to send the user
    
    // 1. Open the file link in a new tab (triggers the download)
    window.open(fileUrl, '_blank');
    
    // 2. Redirect the current window immediately
    window.location.href = redirectUrl;
}
</script>

  </body>
</html>
